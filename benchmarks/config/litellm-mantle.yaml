# LiteLLM proxy config for benchmarking non-Anthropic Bedrock models through
# Claude Code's Anthropic /v1/messages path.
#
# Why this endpoint (and not `provider: bedrock`)? Claude Code always speaks the
# Anthropic Messages API. Sending that straight to Bedrock's Converse path
# (litellm `bedrock/<model>`) reaches Anthropic (Claude) models only, and for
# non-Anthropic models it returns their native tool-call tokens (e.g. Kimi's
# `<|tool_calls_section|>...`) as plain TEXT -- Claude Code never sees a
# structured tool_use block, so agentic runs stall at one turn with 0 artifacts.
#
# Bedrock's `bedrock-mantle` endpoint is an OpenAI-compatible Chat Completions
# API (bedrock-mantle.us-east-1.api.aws/v1). All third-party models on it
# support tool calling and streaming natively, so litellm's `openai/<model>`
# path gets STRUCTURED tool calls back and translates them into Anthropic
# tool_use blocks the agent can act on.
#
# Architecture:
#   Claude Code (Anthropic Messages API)
#     -> LiteLLM proxy (127.0.0.1:4000, Anthropic -> OpenAI Chat Completions)
#       -> Amazon Bedrock `bedrock-mantle` endpoint (bearer-token auth)
#         -> any non-Anthropic model (Kimi, Qwen, DeepSeek, Mistral, ...)
#
# Auth: a 12h bearer token from aws-bedrock-token-generator, injected as the
# MANTLE_API_KEY env var at proxy startup. The bedrock-mantle-proxy.sh script
# generates it for you; clients send a throwaway key (the proxy holds the real
# one). us-east-1 is the only region where bedrock-mantle is available today.
#
# Naming: `model_name` is what you pass to `claude --model` and the harness
# `--model`; it becomes the {model-name} artifact subfolder, so keep it the raw
# Bedrock model id. `litellm_params.model` is that id prefixed `openai/`.
#
# Start with:
#   ./scripts/bedrock-mantle-proxy.sh          # installs deps, mints token, runs on :4000
model_list:
